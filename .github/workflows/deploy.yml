name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build + push frontend
        run: |
          docker build -t registry.digitalocean.com/siem/frontend:${{ github.sha }} ./frontend
          docker push registry.digitalocean.com/siem/frontend:${{ github.sha }}

      - name: Build + push backend
        run: |
          docker build -t registry.digitalocean.com/siem/backend:${{ github.sha }} ./backend
          docker push registry.digitalocean.com/siem/backend:${{ github.sha }}

      - name: Build + push mcp-server
        run: |
          docker build -t registry.digitalocean.com/siem/mcp:${{ github.sha }} ./mcp-server
          docker push registry.digitalocean.com/siem/mcp:${{ github.sha }}

      - name: Update app spec image tags
        run: |
          sed -i "s/IMAGE_TAG/${{ github.sha }}/g" docker-compose.prod.yml

      - name: Trigger App Platform rolling deploy
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }}
