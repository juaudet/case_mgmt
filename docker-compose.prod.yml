version: '3.9'

services:
  frontend:
    image: registry.digitalocean.com/siem/frontend:${IMAGE_TAG}
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXTAUTH_URL: ${FRONTEND_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

  backend:
    image: registry.digitalocean.com/siem/backend:${IMAGE_TAG}
    environment:
      MONGODB_URL: ${MONGODB_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEMO_MODE: 'false'
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MCP_SERVER_URL: http://mcp:8001

  mcp:
    image: registry.digitalocean.com/siem/mcp:${IMAGE_TAG}
    environment:
      DEMO_MODE: 'false'
      VT_API_KEY: ${VT_API_KEY}
      CS_CLIENT_ID: ${CS_CLIENT_ID}
      CS_CLIENT_SECRET: ${CS_CLIENT_SECRET}
      OTX_API_KEY: ${OTX_API_KEY}
