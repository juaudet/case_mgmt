version: '3.9'

services:
  frontend:
    image: registry.digitalocean.com/siem/frontend:${IMAGE_TAG}
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXTAUTH_URL: ${FRONTEND_URL}
      NEXTAUTH_SECRET_FILE: /run/secrets/nextauth_secret
    secrets:
      - nextauth_secret

  backend:
    image: registry.digitalocean.com/siem/backend:${IMAGE_TAG}
    environment:
      MONGODB_URL_FILE: /run/secrets/mongodb_url
      REDIS_URL_FILE: /run/secrets/redis_url
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret
      DEMO_MODE: 'false'
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      TINES_WEBHOOK_URL: ${TINES_WEBHOOK_URL}
    secrets:
      - mongodb_url
      - redis_url
      - jwt_secret
      - anthropic_api_key

  mcp:
    image: registry.digitalocean.com/siem/mcp:${IMAGE_TAG}
    environment:
      DEMO_MODE: 'false'
      TINES_WEBHOOK_URL: ${TINES_WEBHOOK_URL}

secrets:
  mongodb_url:
    external: true
  redis_url:
    external: true
  jwt_secret:
    external: true
  anthropic_api_key:
    external: true
  nextauth_secret:
    external: true
