services:
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_SECRET_FILE: /run/secrets/nextauth_secret
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret
      DEMO_MODE: 'true'
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      MCP_SERVER_URL: http://mcp:8001
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      - mongo
      - redis
      - mcp

  mcp:
    build: ./mcp-server
    ports:
      - '8001:8001'
    environment:
      DEMO_MODE: 'true'
      VT_API_KEY_FILE: /run/secrets/vt_api_key
      CS_CLIENT_ID_FILE: /run/secrets/cs_client_id
      CS_CLIENT_SECRET_FILE: /run/secrets/cs_client_secret
      OTX_API_KEY_FILE: /run/secrets/otx_api_key
      LDAP_BIND_PASSWORD_FILE: /run/secrets/ldap_bind_password
    volumes:
      - ./.secrets:/run/secrets:ro

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
