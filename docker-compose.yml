services:
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      # Set NEXT_PUBLIC_API_URL and NEXTAUTH_URL to your Railway backend/frontend URLs
      # before deploying. They must be real URLs — Next.js bakes NEXT_PUBLIC_* at build time.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      AUTH_API_URL: ${AUTH_API_URL:-http://backend:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongo:27017}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      DEMO_MODE: 'true'
      MOCK_INCIDENT_FEED: 'true'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # Enrichment calls Tines directly (no MCP sidecar required for the API).
      TINES_WEBHOOK_URL: ${TINES_WEBHOOK_URL:-}
    depends_on:
      - mongo
      - redis

  mcp:
    build: ./mcp-server
    ports:
      - '8001:8001'
    environment:
      DEMO_MODE: 'true'
      TINES_WEBHOOK_URL: ${TINES_WEBHOOK_URL:-}

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
