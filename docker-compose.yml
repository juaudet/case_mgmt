services:
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      AUTH_API_URL: http://backend:8000
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_SECRET_FILE: /run/secrets/nextauth_secret
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret
      DEMO_MODE: 'true'
      MOCK_INCIDENT_FEED: 'true'
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      # Enrichment calls Tines directly (no MCP sidecar required for the API).
      TINES_WEBHOOK_URL: https://<YOUR-TINES-TENANT>.tines.com/mcp/<YOUR-TOKEN>
    volumes:
      - ./.secrets:/run/secrets:ro
    depends_on:
      - mongo
      - redis

  mcp:
    build: ./mcp-server
    ports:
      - '8001:8001'
    environment:
      DEMO_MODE: 'true'
      # Tines tools/call webhook (TINES_MCP_URL is still accepted as an alias in tines_client).
      TINES_WEBHOOK_URL: https://<YOUR-TINES-TENANT>.tines.com/mcp/<YOUR-TOKEN>
    volumes:
      - ./.secrets:/run/secrets:ro

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
