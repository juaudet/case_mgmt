version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-prod
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      MONGODB_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: dev-jwt-secret-64-chars-minimum-please-change
      DEMO_MODE: 'true'
      ANTHROPIC_API_KEY: ''
      MCP_SERVER_URL: http://mcp:8001
    depends_on:
      - mongo
      - redis
      - mcp

  mcp:
    build: ./mcp-server
    ports:
      - '8001:8001'
    environment:
      DEMO_MODE: 'true'

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
